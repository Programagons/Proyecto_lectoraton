<section class="notificaciones-page">
  <h1>{{ 'notifications.title' | translate }}</h1>
  @if (loading()) {
    <p class="nota">{{ 'notifications.loading' | translate }}</p>
  } @else if (error()) {
    <p class="nota error">{{ error() }}</p>
  } @else {
    <div class="lista">
      @for (item of items(); track $index) {
        <article class="item">
          <p>{{ item.mensaje }}</p>
        </article>
      } @empty {
        <p class="nota">{{ 'notifications.empty' | translate }}</p>
      }
    </div>
  }
</section>
