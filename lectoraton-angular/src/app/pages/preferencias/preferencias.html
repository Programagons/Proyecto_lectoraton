<section class="preferencias-page">
  <h1>{{ 'preferences.title' | translate }}</h1>
  <div class="card">
    <label for="idiomaSelect">{{ 'preferences.pageLanguage' | translate }}</label>
    <select id="idiomaSelect" [(ngModel)]="idioma" (change)="guardarIdioma()">
      <option value="es">{{ 'preferences.langSpanish' | translate }}</option>
      <option value="en">{{ 'preferences.langEnglish' | translate }}</option>
    </select>
    <p class="nota">{{ 'preferences.autoApplyHint' | translate }}</p>
  </div>
</section>
