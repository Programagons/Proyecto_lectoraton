<footer class="app-footer">
  <div class="footer-inner d-flex flex-wrap justify-content-around align-items-center gap-3 px-4 py-3">
    <a routerLink="/sobre-nosotros" class="footer-link text-decoration-none">{{ 'footer.about' | translate }}</a>
    <a routerLink="/ayuda" class="footer-link text-decoration-none">{{ 'footer.help' | translate }}</a>
    <a
      href="https://x.com"
      target="_blank"
      rel="noopener noreferrer"
      class="footer-social"
      [attr.aria-label]="'footer.xAriaLabel' | translate"
    >
      <!-- SVG Bootstrap Icons (twitter-x): evita depender de la fuente .woff en el bundle -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="footer-x-svg" viewBox="0 0 16 16" aria-hidden="true">
        <path
          d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.601.75Zm-.86 13.028h1.36L4.323 2.145H2.865z"
        />
      </svg>
    </a>
  </div>
</footer>
